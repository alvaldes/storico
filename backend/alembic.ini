[alembic]
script_location = src/storico/infrastructure/database/alembic
prepend_sys_path = src

# The sqlalchemy.url value is overridden at runtime by env.py using
# storico.config.settings.Settings.  The placeholder below is kept so that
# Alembic commands that parse the config without reaching env.py still work.
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
