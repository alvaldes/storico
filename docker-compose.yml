services:
  postgres:
    image: postgres:16-alpine
    container_name: storico-postgres
    environment:
      POSTGRES_DB: storico
      POSTGRES_USER: storico
      POSTGRES_PASSWORD: storico_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storico"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - storico-net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: storico-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - storico-net
    restart: unless-stopped

  storico-ollama:
    image: ollama/ollama:latest
    container_name: storico-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - storico-net
    restart: unless-stopped

  storico-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: storico-api
    ports:
      - "8000:8000"
    environment:
      STORICO_DATABASE_URL: postgresql+asyncpg://storico:storico_dev@postgres:5432/storico
      STORICO_QDRANT_URL: http://qdrant:6333
      STORICO_OLLAMA_BASE_URL: http://storico-ollama:11434
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - storico-net
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  ollama_models:

networks:
  storico-net:
    driver: bridge
